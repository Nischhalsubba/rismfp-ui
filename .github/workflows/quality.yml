# Repository quality checks for every proposed change.
name: Quality checks

# Run checks for pull requests and updates to the main branch.
on:
  pull_request:
  push:
    branches:
      - master

# Limit the workflow to read-only repository access.
permissions:
  contents: read

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest

    steps:
      # Download the exact commit being tested.
      - name: Check out repository
        uses: actions/checkout@v4

      # Use the current long-term-support Node.js release.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Run syntax, structure, accessibility, and link checks.
      - name: Run repository checks
        run: npm run check
